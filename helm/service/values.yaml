# Chart defaults. Every service overrides all of these via a generated
# values file at helm/service/values/<name>.yaml — see docs/service-contract.md.
name: ""
owner: ""
tier: 3
# Cluster-wide convention, not per-service: the Helm release name
# kube-prometheus-stack was installed with (see `make platform-install`).
# The ServiceMonitor's `release` label must match it for
# kube-prometheus-stack's serviceMonitorSelector to pick this up. Override
# here (not per generated values file) if your cluster uses a different name.
prometheusRelease: kube-prometheus-stack
image:
  repository: ""
  tag: ""
runtime:
  port: 8080
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  probes:
    readiness: /healthz/ready
    liveness: /healthz/live
  env: []
