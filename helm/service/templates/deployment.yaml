apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}
  labels:
    app.kubernetes.io/name: {{ .Values.name }}
    app.kubernetes.io/managed-by: platformctl
    platform.io/owner: {{ .Values.owner }}
    platform.io/tier: "{{ .Values.tier }}"
spec:
  replicas: {{ .Values.runtime.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.name }}
        platform.io/owner: {{ .Values.owner }}
        platform.io/tier: "{{ .Values.tier }}"
    spec:
      containers:
        - name: {{ .Values.name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - name: http
              containerPort: {{ .Values.runtime.port }}
          {{- if .Values.runtime.env }}
          env:
            {{- range .Values.runtime.env }}
            - name: {{ .name }}
              value: "{{ .value }}"
            {{- end }}
          {{- end }}
          resources:
            requests:
              cpu: {{ .Values.runtime.resources.requests.cpu }}
              memory: {{ .Values.runtime.resources.requests.memory }}
            limits:
              cpu: {{ .Values.runtime.resources.limits.cpu }}
              memory: {{ .Values.runtime.resources.limits.memory }}
          readinessProbe:
            httpGet:
              path: {{ .Values.runtime.probes.readiness }}
              port: http
          livenessProbe:
            httpGet:
              path: {{ .Values.runtime.probes.liveness }}
              port: http
