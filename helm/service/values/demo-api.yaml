image:
  repository: ghcr.io/amirmarcel/demo-api
  tag: v0.1.0
name: demo-api
owner: platform-team
runtime:
  env:
  - name: LATENCY_MS
    value: '600'
  - name: ERROR_RATE
    value: '0.0'
  port: 8080
  probes:
    liveness: /healthz/live
    readiness: /healthz/ready
  replicas: 2
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
tier: 2
