# kind cluster config for platform-zero. Maps host 80/443 onto the
# control-plane node and labels it for ingress-nginx's kind-specific
# manifest, which schedules its controller onto ingress-ready nodes.
#
# The node image is pinned explicitly (by digest) rather than left to kind's
# default, so the cluster's Kubernetes version is a fact you can read here
# instead of "whatever kind 0.32.0 happens to default to today". CI's
# kubeconform schema check (.github/workflows/ci.yaml) pins
# -kubernetes-version to the same v1.36.1 so the two never silently drift
# apart. Bump both together.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    image: kindest/node:v1.36.1@sha256:3489c7674813ba5d8b1a9977baea8a6e553784dab7b84759d1014dbd78f7ebd5
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
