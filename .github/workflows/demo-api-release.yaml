name: demo-api-release

# Publishes the pinned, immutable image tag services/demo-api/service.yaml
# actually references. Triggered by a demo-api-v* tag only — no path filter,
# since a release tag must always build regardless of what the diff against
# the tagged commit happens to touch.

on:
  push:
    tags:
      - "demo-api-v*"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/demo-api
          tags: |
            type=match,pattern=demo-api-v(.*),group=1,prefix=v

      - uses: docker/build-push-action@v6
        with:
          context: examples/demo-api
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
