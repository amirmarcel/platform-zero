name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install platformctl
        run: pip install -e ".[dev]"

      - name: Validate service manifests
        run: platformctl validate

      - name: Check for drift in derived artifacts
        run: platformctl render --check

      # This pin is load-bearing — do not "helpfully" bump it to a 3.x
      # release. The full reasoning:
      #
      # 1. Prometheus 3.x's promtool hardcodes
      #    `model.NameValidationScheme = model.UTF8Validation` in
      #    cmd/promtool/main.go's init(), and passes that literal (not a
      #    flag-driven variable) into `check rules`. There is no override
      #    flag. Under UTF-8 naming, a hyphenated recording-rule name like
      #    `demo-api:sli_error_ratio:rate5m` is syntactically legal, so
      #    3.x's `promtool check rules` — even with `--lint=all
      #    --lint-fatal` — accepts it and exits 0.
      # 2. The Prometheus Operator's admission webhook
      #    (cmd/admission-webhook in prometheus-operator/prometheus-operator)
      #    defaults its `--name-validation-scheme` flag to `legacy`. That
      #    default is what actually rejects an invalid identifier at
      #    `kubectl apply`/ArgoCD-sync time in a real cluster.
      # 3. Prometheus 2.55.1's promtool predates UTF-8 naming support
      #    entirely — `rulefmt.Parse` in that version takes no validation-
      #    scheme argument at all, because the legacy ASCII grammar
      #    (`[a-zA-Z_:][a-zA-Z0-9_:]*`) was the only grammar that existed.
      #    That makes it a faithful, offline stand-in for the webhook's
      #    default behavior, with no cluster, TLS, or AdmissionReview
      #    plumbing required.
      # 4. Therefore: bumping this pin to any 3.x promtool silently turns
      #    this step into a no-op grammar check (it will still run, still
      #    print SUCCESS, and still exit 0 for names a real cluster would
      #    reject). If promtool 2.x is ever end-of-life'd, replace this
      #    step with something that enforces the *legacy* scheme
      #    explicitly — don't just bump the version.
      - name: Install promtool
        run: |
          set -euo pipefail
          curl -sSL -o promtool.tar.gz https://github.com/prometheus/prometheus/releases/download/v2.55.1/prometheus-2.55.1.linux-amd64.tar.gz
          echo "19700bdd42ec31ee162e4079ebda4cd0a44432df4daa637141bdbea4b1cd8927  promtool.tar.gz" | sha256sum -c -
          tar xzf promtool.tar.gz prometheus-2.55.1.linux-amd64/promtool
          sudo mv prometheus-2.55.1.linux-amd64/promtool /usr/local/bin/promtool
          rm -rf promtool.tar.gz prometheus-2.55.1.linux-amd64

      # Independent oracle: promtool is Prometheus's own rule-file parser,
      # so this catches grammar violations (e.g. an invalid metric/alert
      # identifier) that our renderer's own golden-file tests cannot,
      # because those fixtures are generated by the same code being tested.
      # See the load-bearing version-pin comment above the install step —
      # this only works because promtool here is pinned to the 2.x series.
      - name: Check Prometheus rules against promtool's own grammar
        run: promtool check rules observability/rules/*.yaml

      - name: Install kubeconform
        run: |
          set -euo pipefail
          curl -sSL -o kubeconform.tar.gz https://github.com/yannh/kubeconform/releases/download/v0.8.0/kubeconform-linux-amd64.tar.gz
          echo "9bc2bffbf71f261128533edaf912153948b7ff238f9a531ae6d34466ec287883  kubeconform.tar.gz" | sha256sum -c -
          tar xzf kubeconform.tar.gz kubeconform
          sudo mv kubeconform /usr/local/bin/kubeconform
          rm kubeconform.tar.gz

      - uses: azure/setup-helm@v5
        with:
          version: v4.2.3

      # Second independent oracle: validates every rendered Kubernetes
      # object against the real Kubernetes/CRD OpenAPI schemas, with no
      # cluster involved. Same rationale as promtool above — this is
      # schema validation from an external source of truth, not a
      # comparison against our own previously-generated fixtures.
      - name: Validate rendered manifests against Kubernetes/CRD schemas
        env:
          # Matches local/kind-config.yaml's pinned node image exactly, so
          # the version we validate against is the version the cluster
          # actually runs — not an arbitrary "recent" choice.
          K8S_VERSION: "1.36.1"
          # datreeio/CRDs-catalog pinned to a fixed commit (not `main`), so
          # a CI failure here can only come from our own rendered output,
          # never from an unrelated upstream catalog change landing between
          # runs. Bump deliberately when a new CRD/apiVersion is needed.
          CRD_CATALOG_SHA: "34cef0fc2698bbb611f475515e555a2d7ca85b6c"
        run: |
          set -euo pipefail
          shopt -s nullglob

          schema_args=(
            -strict
            -kubernetes-version "$K8S_VERSION"
            -schema-location default
            -schema-location "https://raw.githubusercontent.com/datreeio/CRDs-catalog/${CRD_CATALOG_SHA}/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json"
          )

          # kubeconform is silent on success unless told otherwise: with
          # neither -summary nor -verbose it prints nothing for valid input
          # AND nothing for empty input, so a broken pipeline upstream (a
          # bad `helm template` invocation, an empty glob, ...) would exit 0
          # looking identical to a real pass. -summary/-verbose make it
          # print what it did; the resource-count check below turns
          # "printed nothing" into a hard failure instead of a silent pass.
          check() {
            local label="$1"
            local out
            if ! out=$(kubeconform "${schema_args[@]}" -summary -verbose); then
              echo "$out"
              echo "::error::${label}: kubeconform reported invalid resources"
              exit 1
            fi
            echo "$out"
            local count
            count=$(printf '%s\n' "$out" | sed -n -E 's/^Summary: ([0-9]+) resources? found.*/\1/p')
            if [ -z "$count" ] || [ "$count" -eq 0 ]; then
              echo "::error::${label}: kubeconform validated zero resources — check was not testing anything"
              exit 1
            fi
          }

          check_files() {
            local label="$1"
            shift
            local out
            if ! out=$(kubeconform "${schema_args[@]}" -summary -verbose "$@"); then
              echo "$out"
              echo "::error::${label}: kubeconform reported invalid resources"
              exit 1
            fi
            echo "$out"
            local count
            count=$(printf '%s\n' "$out" | sed -n -E 's/^Summary: ([0-9]+) resources? found.*/\1/p')
            if [ -z "$count" ] || [ "$count" -eq 0 ]; then
              echo "::error::${label}: kubeconform validated zero resources — check was not testing anything"
              exit 1
            fi
          }

          for values in helm/service/values/*.yaml; do
            name=$(basename "$values" .yaml)
            echo "== helm/service ($name) =="
            helm template "$name" helm/service -f "$values" | check "helm/service ($name)"
          done

          echo "== observability chart =="
          helm template observability observability | check "observability chart"

          apps=(argocd/apps/*.yaml)
          if [ "${#apps[@]}" -gt 0 ]; then
            echo "== argocd/apps =="
            check_files "argocd/apps" "${apps[@]}"
          fi

      - name: Run tests
        run: pytest -q

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9.8"

      # terraform/ is reference infrastructure, never applied — see
      # terraform/README.md. This only checks that it's internally
      # consistent, well-formatted HCL for the `aws` provider; there is no
      # plan/apply step and no AWS credentials available to this workflow.
      - name: Check Terraform formatting
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Initialize Terraform (no backend, no credentials)
        working-directory: terraform
        run: terraform init -backend=false

      - name: Validate Terraform
        working-directory: terraform
        run: terraform validate
