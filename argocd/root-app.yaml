# The app-of-apps. Applied once, by hand, via `make platform-bootstrap` — the
# only manifest in this repo that is ever `kubectl apply`-ed directly. Every
# Application under argocd/apps/ (one per service, rendered by `platformctl
# render`) is then picked up and synced by ArgoCD automatically. Adding a
# service from here on is `platformctl init && platformctl render && git
# commit` — nothing more.
#
# repoURL is __ARGOCD_REPO_URL__, substituted by `make platform-bootstrap`
# from platform/config.yaml's argocd.repo_url — the same single source of
# truth `platformctl render` reads for every generated Application. Keep
# both in sync when you point this repo at a real fork.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: __ARGOCD_REPO_URL__
    targetRevision: HEAD
    path: argocd/apps
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
