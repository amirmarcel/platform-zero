apiVersion: platform/v1
name: demo-api
owner: platform-team
tier: 2
image:
  repository: ghcr.io/amirmarcel/demo-api
  tag: v0.1.0
runtime:
  port: 8080
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  probes:
    readiness: /healthz/ready
    liveness: /healthz/live
  env:
    - name: LATENCY_MS
      value: "0"
    - name: ERROR_RATE
      value: "0.0"
slo:
  availability: 99.5
  latency_p99_ms: 500
  window: 30d
operations:
  runbook: docs/runbooks/demo-api.md
  rollback: gitops-revert
